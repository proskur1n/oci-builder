name: Continuous integration
on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
jobs:
    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-node@v3
              with:
                  node-version: 22
            - run: npm install
            - run: npm run typecheck
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-node@v3
              with:
                  node-version: 22
            - run: npm install
            - run: npm test
